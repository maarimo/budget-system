<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ver Orçamentos</title>

  <style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
    }

    h1 {
        text-align: center;
    }

    .container {
        max-width: 800px;
        margin: auto;
    }

    .card {
        background: white;
        padding: 16px;
        margin-bottom: 12px;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .buttons {
        margin-top: 10px;
    }

    button {
        padding: 8px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        margin-right: 5px;
    }

    .btn-pdf {
        background: #007bff;
        color: white;
    }

    .btn-delete {
        background: #dc3545;
        color: white;
    }

    .btn-back {
        margin-bottom: 20px;
        background: #6c757d;
        color: white;
    }
  </style>
</head>
<body>

<div class="container">

  <button class="btn-back" onclick="goBack()">Menu</button>

  <h1>Orçamentos</h1>

  <div id="budgetList"></div>

</div>

<script>

  function goBack() {
      window.location.href = "index.html";
  }

  function loadBudgets() {
      fetch("http://localhost:8080/budgets")
          .then(response => response.json())
          .then(data => {

              const list = document.getElementById("budgetList");
              list.innerHTML = "";

              data.forEach(budget => {

                  const card = document.createElement("div");
                  card.className = "card";

                  card.innerHTML = `
                      <strong>Cliente:</strong> ${budget.customer.name} <br>
                      <strong>Total:</strong> R$ ${budget.totalAmount} <br>
                      <strong>Status:</strong> ${budget.status} <br>

                      <div class="buttons">
                          <button class="btn-pdf" onclick="viewPdf(${budget.id})">
                              Ver PDF
                          </button>

                          <button class="btn-delete" onclick="deleteBudget(${budget.id})">
                              Excluir
                          </button>
                      </div>
                  `;

                  list.appendChild(card);
              });

          })
          .catch(error => console.error("Erro ao carregar:", error));
  }

  function viewPdf(id) {
      window.open(`http://localhost:8080/budgets/${id}/pdf`, "_blank");
  }

  function deleteBudget(id) {

      const confirmDelete = confirm("Tem certeza que deseja excluir este orçamento?");

      if (!confirmDelete) return;

      fetch(`http://localhost:8080/budgets/${id}`, {
          method: "DELETE"
      })
      .then(response => {
          if (response.status === 204) {
              alert("Orçamento deletado com sucesso!");
              loadBudgets();
          } else {
              alert("Erro ao deletar orçamento");
          }
      })
      .catch(error => console.error("Erro:", error));
  }

  // carrega automaticamente ao abrir a página
  loadBudgets();

</script>

</body>
</html>
